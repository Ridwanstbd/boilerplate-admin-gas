<script>
  var TOKEN_KEY = "gas_admin_session";

  // Jalankan ini otomatis saat halaman selesai di-refresh/dimuat
  window.onload = function () {
    var sessionStr = localStorage.getItem(TOKEN_KEY);
    if (sessionStr) {
      // Jika ada data sesi di storage, langsung masuk app
      var sessionData = JSON.parse(sessionStr);
      _bootApp(sessionData);
    } else {
      _bootPublic();
    }
  };

  function _bootPublic() {
    document.getElementById("app-shell").classList.add("hidden");
    document.getElementById("public-shell").classList.remove("hidden");
    document.getElementById("login-view").classList.remove("hidden");
    document.getElementById("register-view").classList.add("hidden");
  }

  function _bootApp(session) {
    document.getElementById("public-shell").classList.add("hidden");
    document.getElementById("app-shell").classList.remove("hidden");

    // Fungsi ini ada di scripts.app.html Anda untuk memuat email & role ke UI
    _initAppUI(session);
  }
</script>
