<script>
  /* ==========================================================
     scripts.app.html
     JavaScript client-side untuk halaman app (setelah login).
     Hanya dimuat di index.app.html.

     Middleware client-side:
     - Saat load, verifikasi session ke server via apiCheckSession()
     - Jika session tidak valid → redirect ke halaman publik (login)
     - Navigasi antar page dilakukan di client tanpa reload
  ========================================================== */

  // ── Inisialisasi saat halaman app dimuat ─────────────────

  document.addEventListener("DOMContentLoaded", function () {
    _verifySession();
  });

  /**
   * Verifikasi session ke server saat pertama kali load.
   * Ini adalah lapisan proteksi kedua (server sudah cek di doGet,
   * ini memastikan konsistensi data user di UI).
   */
  function _verifySession() {
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.success) {
          // Session tidak valid di sisi server → paksa ke halaman login
          _redirectToPublic();
          return;
        }
        _initApp(res.session);
      })
      .withFailureHandler(function () {
        _redirectToPublic();
      })
      .apiCheckSession();
  }

  /**
   * Inisialisasi UI setelah session terkonfirmasi.
   * @param {{ email: string, role: string }} session
   */
  function _initApp(session) {
    // Isi info user di sidebar
    var emailEl = document.getElementById("user-email");
    var roleEl = document.getElementById("user-role");
    var avatarEl = document.getElementById("user-avatar");
    var topbarEl = document.getElementById("topbar-user");

    if (emailEl) emailEl.textContent = session.email;
    if (roleEl) roleEl.textContent = session.role;
    if (avatarEl) avatarEl.textContent = session.email.charAt(0).toUpperCase();
    if (topbarEl) topbarEl.textContent = session.email;

    // Isi stat cards di dashboard
    var statRole = document.getElementById("stat-role");
    if (statRole) statRole.textContent = session.role;

    // Navigasi ke halaman default
    navigateTo("dashboard");
  }

  function _redirectToPublic() {
    google.script.run
      .withSuccessHandler(function (url) {
        window.top.location.href = url;
      })
      .withFailureHandler(function () {
        window.top.location.reload();
      })
      .getWebAppUrl();
  }

  // ── Navigasi antar page (client-side, tanpa reload) ──────

  var _currentPage = null;

  function navigateTo(pageId) {
    // Sembunyikan semua page
    document.querySelectorAll(".page-view").forEach(function (el) {
      el.classList.add("hidden");
    });

    // Tampilkan page yang dipilih
    var target = document.getElementById("page-" + pageId);
    if (target) target.classList.remove("hidden");

    // Update active state di sidebar
    document.querySelectorAll(".nav-item").forEach(function (el) {
      el.classList.remove("active");
    });
    var navItem = document.querySelector('[data-page="' + pageId + '"]');
    if (navItem) navItem.classList.add("active");

    // Update judul topbar
    var titles = {
      dashboard: "Dashboard",
      users: "Manajemen Pengguna",
      settings: "Pengaturan",
    };
    var topbarTitle = document.getElementById("topbar-title");
    if (topbarTitle) topbarTitle.textContent = titles[pageId] || pageId;

    _currentPage = pageId;
  }

  // ── Handler Logout ───────────────────────────────────────

  function handleLogout() {
    var btn = document.querySelector(".sidebar__footer .btn-ghost");
    if (btn) {
      btn.disabled = true;
      btn.textContent = "Keluar…";
    }

    google.script.run
      .withSuccessHandler(function (res) {
        // Session sudah dihapus di server → redirect ke halaman login
        _redirectToPublic();
      })
      .withFailureHandler(function (err) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = "🚪 Keluar";
        }
        console.error("Logout gagal:", err.message);
        // Tetap redirect meskipun gagal, agar UI tidak terjebak
        _redirectToPublic();
      })
      .apiLogout();
  }
</script>
