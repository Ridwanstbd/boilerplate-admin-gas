<script>
  /* ==========================================================
     scripts.app.html
     Handler untuk halaman app: navigasi, logout.
     Semua panggilan server menyertakan _token dari cookie.
  ========================================================== */

  function _initAppUI(session) {
    var email = session.email || "";
    var role = session.role || "";

    function el(id) {
      return document.getElementById(id);
    }

    if (el("user-email")) el("user-email").textContent = email;
    if (el("user-role")) el("user-role").textContent = role;
    if (el("user-avatar"))
      el("user-avatar").textContent = email.charAt(0).toUpperCase();
    if (el("topbar-user")) el("topbar-user").textContent = email;
    if (el("stat-role")) el("stat-role").textContent = role;

    navigateTo("dashboard");
  }

  // ── Navigasi antar page (tanpa reload) ───────────────────

  function navigateTo(pageId) {
    document.querySelectorAll(".page-view").forEach(function (el) {
      el.classList.add("hidden");
    });
    var target = document.getElementById("page-" + pageId);
    if (target) target.classList.remove("hidden");

    document.querySelectorAll(".nav-item").forEach(function (el) {
      el.classList.remove("active");
    });
    var navItem = document.querySelector('[data-page="' + pageId + '"]');
    if (navItem) navItem.classList.add("active");

    var titles = {
      dashboard: "Dashboard",
      users: "Manajemen Pengguna",
      settings: "Pengaturan",
    };
    var titleEl = document.getElementById("topbar-title");
    if (titleEl) titleEl.textContent = titles[pageId] || pageId;
  }

  // ── Logout ───────────────────────────────────────────────

  function handleLogout() {
    localStorage.removeItem("gas_admin_session");

    _bootPublic();

    google.script.run.apiLogout();
  }
</script>
