<script>
  function switchView(viewId) {
    document.getElementById("login-view").classList.add("hidden");
    document.getElementById("register-view").classList.add("hidden");
    document.getElementById("dashboard-view").classList.add("hidden");

    document.getElementById(viewId).classList.remove("hidden");
    clearMessages();
  }

  function clearMessages() {
    document.getElementById("login-msg").innerText = "";
    document.getElementById("reg-msg").innerText = "";
  }

  function handleLogin() {
    const email = document.getElementById("login-email").value;
    const pass = document.getElementById("login-password").value;
    const msgDiv = document.getElementById("login-msg");

    if (!email || !pass) {
      msgDiv.innerText = "Isi email dan password.";
      msgDiv.style.color = "red";
      return;
    }

    msgDiv.innerText = "Memverifikasi...";
    msgDiv.style.color = "blue";

    google.script.run
      .withSuccessHandler(function (response) {
        if (response.success) {
          document.getElementById("user-email").innerText = response.email;
          switchView("dashboard-view");
        } else {
          msgDiv.innerText = response.message;
          msgDiv.style.color = "red";
        }
      })
      .withFailureHandler(function (err) {
        msgDiv.innerText = "Terjadi kesalahan: " + err.message;
        msgDiv.style.color = "red";
      })
      .apiLoginUser(email, pass);
  }

  function handleRegister() {
    const email = document.getElementById("reg-email").value;
    const pass = document.getElementById("reg-password").value;
    const msgDiv = document.getElementById("reg-msg");

    if (!email || !pass) {
      msgDiv.innerText = "Isi email dan password.";
      msgDiv.style.color = "red";
      return;
    }

    msgDiv.innerText = "Mendaftarkan...";
    msgDiv.style.color = "blue";

    google.script.run
      .withSuccessHandler(function (response) {
        if (response.success) {
          msgDiv.innerText = response.message + " Silakan login.";
          msgDiv.style.color = "green";
          setTimeout(() => switchView("login-view"), 1500);
        } else {
          msgDiv.innerText = response.message;
          msgDiv.style.color = "red";
        }
      })
      .withFailureHandler(function (err) {
        msgDiv.innerText = "Terjadi kesalahan: " + err.message;
        msgDiv.style.color = "red";
      })
      .apiRegisterAdmin(email, pass);
  }

  function handleLogout() {
    switchView("login-view");
    document.getElementById("login-email").value = "";
    document.getElementById("login-password").value = "";
  }

  // --- FUNGSI NAVIGASI DASHBOARD ---
  function switchTab(tabId) {
    // 1. Sembunyikan semua konten tab
    const contents = document.querySelectorAll(".tab-content");
    contents.forEach((content) => content.classList.add("hidden"));

    // 2. Hapus class 'active' dari semua menu navigasi
    const navItems = document.querySelectorAll(".nav-item");
    navItems.forEach((item) => item.classList.remove("active"));

    // 3. Tampilkan tab yang dipilih
    document.getElementById(tabId).classList.remove("hidden");

    // 4. Set status 'active' pada item navigasi terkait (Sidebar & Bottom Nav)
    const activeNavs = document.querySelectorAll(`[data-target="${tabId}"]`);
    activeNavs.forEach((nav) => nav.classList.add("active"));
  }
</script>
