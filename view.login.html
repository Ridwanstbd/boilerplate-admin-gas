<div id="login-view" class="container">
  <h2>Login Admin</h2>
  <div id="login-msg" class="message"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="login-email" required />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" required />
  </div>
  <button onclick="handleLogin()">Login</button>
  <span class="link" onclick="switchView('register-view')">Daftar Admin Baru</span>
</div>

<!-- VIEW: Register -->
<div id="register-view" class="container hidden">
  <h2>Daftar Admin Baru</h2>
  <div id="reg-msg" class="message"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="reg-email" required />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="reg-password" required />
    <small>Min 8 karakter, huruf besar, huruf kecil, angka, dan simbol (@$!%*?&#)</small>
  </div>
  <button onclick="handleRegister()">Daftar</button>
  <span class="link" onclick="switchView('login-view')">Sudah punya akun? Login</span>
</div>

<!-- VIEW: Dashboard -->
<div id="dashboard-view" class="container hidden">
  <h2>Dashboard Admin</h2>
  <p>Selamat datang, <strong id="user-email"></strong>!</p>
  <button onclick="handleLogout()">Logout</button>
</div>
