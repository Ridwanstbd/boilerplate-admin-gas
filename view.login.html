<div id="login-view" class="container">
  <h2>Login Admin</h2>
  <div id="login-msg" class="message"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="login-email" required />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" required />
  </div>
  <button onclick="handleLogin()">Login</button>
  <span class="link" onclick="switchView('register-view')">Daftar Admin Baru</span>
</div>

<!-- VIEW: Register -->
<div id="register-view" class="container hidden">
  <h2>Daftar Admin Baru</h2>
  <div id="reg-msg" class="message"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="reg-email" required />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="reg-password" required />
    <small>Min 8 karakter, huruf besar, huruf kecil, angka, dan simbol (@$!%*?&#)</small>
  </div>
  <button onclick="handleRegister()">Daftar</button>
  <span class="link" onclick="switchView('login-view')">Sudah punya akun? Login</span>
</div>

<!-- VIEW: Dashboard -->
<div id="dashboard-view" class="hidden">
  
  <div class="dashboard-header">
    <h3>AdminPanel</h3>
    <button onclick="handleLogout()" style="width: auto; margin: 0; padding: 0.5rem 1rem;">Logout</button>
  </div>

  <div class="dashboard-layout">
    <div class="sidebar">
      <div class="nav-item active" data-target="tab-home" onclick="switchTab('tab-home')">Home</div>
      <div class="nav-item" data-target="tab-produk" onclick="switchTab('tab-produk')">Produk</div>
    </div>

    <div class="main-content">
      <div id="tab-home" class="tab-content">
        <h2>Dashboard</h2>
        <p>Selamat datang, <strong id="user-email"></strong>!</p>
      </div>
      
      <div id="tab-produk" class="tab-content hidden">
        <h2>Manajemen Produk</h2>
        <p>Area daftar produk Anda.</p>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" data-target="tab-home" onclick="switchTab('tab-home')">Home</div>
    <div class="nav-item" data-target="tab-produk" onclick="switchTab('tab-produk')">Produk</div>
  </div>
</div>
