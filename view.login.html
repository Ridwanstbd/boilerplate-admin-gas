<!-- view.login.html -->
<!-- Hanya berisi form login. Dimuat di index.public.html -->

<div id="login-view" class="auth-card">
  <div class="auth-card__logo">
    <h1>⚙️ Admin Panel</h1>
    <p>Masuk untuk melanjutkan</p>
  </div>

  <div id="login-msg" class="msg"></div>

  <div class="form-group">
    <label for="login-email">Alamat Email</label>
    <input
      type="email"
      id="login-email"
      placeholder="admin@example.com"
      autocomplete="email"
      required
    />
  </div>

  <div class="form-group">
    <label for="login-password">Password</label>
    <input
      type="password"
      id="login-password"
      placeholder="••••••••"
      autocomplete="current-password"
      required
    />
  </div>

  <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">
    Masuk
  </button>

  <div class="auth-footer">
    Belum punya akun?
    <span class="link" onclick="switchAuthView('register-view')"
      >Daftar Admin</span
    >
  </div>
</div>
