<!-- view.register.html -->
<!-- Hanya berisi form registrasi. Dimuat di index.public.html -->

<div id="register-view" class="auth-card hidden">
  <div class="auth-card__logo">
    <h1>⚙️ Admin Panel</h1>
    <p>Daftar akun admin baru</p>
  </div>

  <div id="reg-msg" class="msg"></div>

  <div class="form-group">
    <label for="reg-email">Alamat Email</label>
    <input
      type="email"
      id="reg-email"
      placeholder="admin@example.com"
      autocomplete="email"
      required
    />
  </div>

  <div class="form-group">
    <label for="reg-password">Password</label>
    <input
      type="password"
      id="reg-password"
      placeholder="••••••••"
      autocomplete="new-password"
      required
    />
    <small>
      Min. 8 karakter &bull; Huruf besar &bull; Huruf kecil &bull;
      Angka &bull; Simbol (@$!%*?&#)
    </small>
  </div>

  <div class="form-group">
    <label for="reg-password-confirm">Konfirmasi Password</label>
    <input
      type="password"
      id="reg-password-confirm"
      placeholder="••••••••"
      autocomplete="new-password"
      required
    />
  </div>

  <button class="btn btn-primary" id="reg-btn" onclick="handleRegister()">
    Daftar
  </button>

  <div class="auth-footer">
    Sudah punya akun?
    <span class="link" onclick="switchAuthView('login-view')">Masuk</span>
  </div>
</div>
